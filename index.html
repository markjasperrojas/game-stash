<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <title>Game Stash</title>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <img src="./assets/gamestash-logo.png" alt="Logo" id="logo" />
      <button type="button" id="signin">Sign in</button>
    </header>

    <div class="content">
      <div class="plus-button">
        <button type="button" id="open-btn">+</button>
      </div>
      <div class="games-div"></div>
    </div>

    <dialog id="game-dialog">
      <form id="form">
        <p>Add Game</p>

        <input
          type="text"
          name="title"
          id="title"
          placeholder="Title"
          required
        />

        <input
          type="text"
          name="developer"
          id="developer"
          placeholder="Developer"
          required
        />

        <input
          type="number"
          name="price"
          id="price"
          placeholder="Price"
          required
        />

        <select name="status" id="status">
          <option value="Played">Played</option>
          <option value="Not Played">Not played</option>
        </select>

        <button type="submit">Add Game</button>
        <button type="button" id="close-btn">Cancel</button>
      </form>
    </dialog>

    <footer>
      <p>&copy; 2026 Built by markjasperrojas</p>
      <a href="https://github.com/markjasperrojas" target="_blank"
        ><img src="./assets/github-logo.svg" alt="Github logo" id="github-logo"
      /></a>
    </footer>
  </body>
</html>
