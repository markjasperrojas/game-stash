<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Game Stash</title>
    <script src="script.js" defer></script>
  </head>

  <body>
    <table>
      <thead>
        <tr>
          <th>TITLE</th>
          <th>DEVELOPER</th>
          <th>PRICE</th>
        </tr>
      </thead>

      <tbody id="display-data"></tbody>
    </table>

    <button type="button" id="open-btn">Add Game</button>

    <dialog id="game-dialog">
      <form id="form">
        <p>Add Game</p>

        <input
          type="text"
          name="title"
          id="title"
          placeholder="Title"
          required
        />

        <input
          type="text"
          name="developer"
          id="developer"
          placeholder="Developer"
          required
        />

        <input
          type="number"
          name="price"
          id="price"
          placeholder="Price"
          required
        />

        <select name="status" id="status">
          <option value="Played">Played</option>
          <option value="Not Played">Not played</option>
        </select>

        <div class="actions">
          <button type="button" id="close-btn">Cancel</button>
          <button type="submit">Add Game</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
